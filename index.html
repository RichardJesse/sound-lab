<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Interface</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">

  <div class="keyboard-hint">
    <kbd>Space</kbd> Play/Pause &nbsp;
    <kbd>M</kbd> Mute &nbsp;
    <kbd>L</kbd> Loop &nbsp;
    <kbd>←</kbd><kbd>→</kbd> Skip &nbsp;
    <kbd>↑</kbd><kbd>↓</kbd> Volume
  </div>

</div>

<div class="player">

 
  <div class="panel panel-left">
    <div class="player-title">Audio Interface</div>

    <div class="art-card">
      <div class="art-card-icon">&#9835;</div>
      <div class="track-info">
        <div class="track-name" id="trackName">Select a Track</div>
        <div class="track-artist" id="trackArtist">—</div>
      </div>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="time-display">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>


    <div class="controls">
      
      <button class="btn btn-sm" id="btnLoop" title="Loop (L)">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>

      <button class="btn btn-sm" id="btnPrev" title="Previous Track">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>

      <button class="btn btn-sm" id="btnSkipBack" title="Skip -10s (←)">
        <svg viewBox="0 0 24 24"><path d="M12.5 3C7.81 3 4.01 6.54 3.68 11H1l3.89 3.89.07.14L9 11H6.73C7.06 7.9 9.51 5.5 12.5 5.5c3.31 0 6 2.69 6 6s-2.69 6-6 6c-1.66 0-3.16-.67-4.24-1.76l-1.42 1.42A7.987 7.987 0 0 0 12.5 19.5c4.42 0 8-3.58 8-8s-3.58-8-8-8z"/><text x="10" y="16" font-size="7" fill="currentColor" text-anchor="middle" font-weight="bold">10</text></svg>
      </button>

      <button class="btn btn-lg" id="btnPlay" title="Play / Pause (Space)">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>

      <button class="btn btn-sm" id="btnSkipFwd" title="Skip +10s (→)">
        <svg viewBox="0 0 24 24"><path d="M11.5 3c4.69 0 8.49 3.54 8.82 8H23l-3.89 3.89-.07.14L15 11h2.27C16.94 7.9 14.49 5.5 11.5 5.5c-3.31 0-6 2.69-6 6s2.69 6 6 6c1.66 0 3.16-.67 4.24-1.76l1.42 1.42A7.987 7.987 0 0 1 11.5 19.5c-4.42 0-8-3.58-8-8s3.58-8 8-8z"/><text x="14" y="16" font-size="7" fill="currentColor" text-anchor="middle" font-weight="bold">10</text></svg>
      </button>

      <button class="btn btn-sm" id="btnNext" title="Next Track">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>

      <button class="btn btn-sm" id="btnMute" title="Mute (M)">
        <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.77v6.46A4.47 4.47 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg id="iconMute" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12A4.5 4.5 0 0 0 14 8.77v2.06l2.47 2.47c.03-.1.03-.2.03-.3zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4l-2.11 2.11L12 8.22V4z"/></svg>
      </button>
    </div>

    <div class="volume-section">
      <button class="btn btn-sm" id="btnVolDown" title="Volume Down (↓)">
        <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
      </button>
      <div class="volume-slider-wrap">
        <input type="range" id="volumeSlider" min="0" max="100" value="80">
      </div>
      <span class="volume-label" id="volumeLabel">80%</span>
      <button class="btn btn-sm" id="btnVolUp" title="Volume Up (↑)">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </div>

    <div class="speed-section">
      <label>Speed:</label>
      <button class="speed-btn" data-speed="0.5">0.5×</button>
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="1.5">1.5×</button>
      <button class="speed-btn" data-speed="2">2×</button>
    </div>
  </div>

  <div class="panel panel-right">
   
    <div class="playlist">
      <h3>Playlist <span class="drag-hint">Drag to reorder</span></h3>
      <div id="playlistContainer"></div>
    </div>

    <div class="upload-section">
      <label class="upload-label" for="fileInput">
        + Load your own audio file
      </label>
      <input type="file" id="fileInput" accept="audio/*">
    </div>
  </div>

</div>


<script src="js/config.js"></script>
<script src="js/playback.js"></script>
<script src="js/volume.js"></script>
<script src="js/speed.js"></script>
<script src="js/playlist.js"></script>
<script src="js/keyboard.js"></script>

</body>
</html>
